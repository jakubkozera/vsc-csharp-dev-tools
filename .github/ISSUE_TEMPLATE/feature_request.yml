name: Feature Request
description: Suggest an idea for the C# Dev Tools extension
title: "[Feature]: "
labels: ["enhancement"]
body:
- type: textarea
  attributes:
    label: Description
    description: A clear and concise description of the feature request.
  validations:
    required: true
- type: textarea
  attributes:
    label: Use Case
    description: Describe the use case for this feature. How would it help you?
- type: textarea
  attributes:
    label: Proposed Solution
    description: Describe the solution you'd like. Provide as much detail as possible.
- type: textarea
  attributes:
    label: Alternatives Considered
    description: Describe alternatives you've considered, if any.
- type: textarea
  attributes:
    label: Additional Context
    description: Any other context, screenshots, or examples related to the feature request.